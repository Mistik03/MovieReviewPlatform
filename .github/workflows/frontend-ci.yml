name: Frontend CI

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']
  pull_request:
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      # tsc runs as part of the build script; production deploys happen via Vercel's Git integration
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://moviereview-api.onrender.com
